<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EY-GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-active { border-bottom: 3px solid #38bdf8; color: #38bdf8; }
        input { background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #38bdf8; text-align: center; }
    </style>
</head>
<body class="p-4 pb-24">

    <!-- LOGIN -->
    <div id="login-screen" class="min-h-screen flex flex-col justify-center items-center">
        <h1 class="text-4xl font-black text-blue-500 mb-8 italic">EY-GYM</h1>
        <div class="glass p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <select id="user-select" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-6 text-lg">
                <option value="Gabriel">Gabriel Yotich</option>
                <option value="Paula">Paula Acevedo</option>
            </select>
            <button onclick="document.getElementById('file-input').click()" class="w-full bg-slate-800 p-3 rounded-xl mb-3 text-sm font-bold border border-slate-600">📂 SUBIR PLANILLA EXCEL</button>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls">
            <button onclick="startApp()" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-lg shadow-lg">EMPEZAR RUTINA</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-app" class="hidden">
        <header class="flex justify-between items-center mb-6">
            <h2 id="user-name" class="text-2xl font-bold text-blue-400"></h2>
            <button onclick="location.reload()" class="text-xs text-slate-500 uppercase font-bold">Cerrar Sesión</button>
        </header>

        <div class="flex justify-between mb-6 border-b border-slate-800">
            <button id="btn-dia1" onclick="renderDay(1)" class="day-btn pb-2 px-4 font-bold">DÍA 1</button>
            <button id="btn-dia2" onclick="renderDay(2)" class="day-btn pb-2 px-4 font-bold">DÍA 2</button>
            <button id="btn-dia3" onclick="renderDay(3)" class="day-btn pb-2 px-4 font-bold">DÍA 3</button>
        </div>

        <div id="workout-list" class="space-y-4"></div>
    </div>

    <script>
        let rawData = [];
        let currentUser = "";

        document.getElementById('file-input').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                localStorage.setItem('gym_db', JSON.stringify(rawData));
                alert("Rutina actualizada correctamente.");
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function startApp() {
            const saved = localStorage.getItem('gym_db');
            if(saved) rawData = JSON.parse(saved);
            if(rawData.length === 0) return alert("Por favor, subí tu Excel primero.");

            currentUser = document.getElementById('user-select').value;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-name').innerText = currentUser;
            renderDay(1);
        }

        function renderDay(num) {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-dia'+num).classList.add('tab-active');

            const container = document.getElementById('workout-list');
            container.innerHTML = "";

            const filtered = rawData.filter(row => row.dia == num);

            filtered.forEach(ej => {
                const isCinta = ej.Ejercicios.toLowerCase().includes('cinta');
                const card = document.createElement('div');
                card.className = "glass p-4 rounded-2xl border-l-4 " + (isCinta ? "border-green-500" : "border-blue-500");
                
                let content = `<div class="flex justify-between font-bold mb-2">
                    <span>${ej.Ejercicios}</span>
                    <span class="text-blue-400">${ej.series ? ej.series + 'x' + ej.repeticiones : ''}</span>
                </div>`;

                if (isCinta) {
                    content += `<div class="flex gap-4 text-xs text-slate-400">
                        <span>TIEMPO: <b class="text-green-400">${ej.tiempo || ''}</b></span>
                        <span>VELOCIDAD: <b class="text-green-400">${ej.velocidad || ''}</b></span>
                    </div>`;
                } else {
                    content += `<div class="grid grid-cols-2 gap-3 mt-2">
                        <div class="flex flex-col"><span class="text-[9px] text-slate-500 uppercase">Carga Inicial</span><input type="number" value="${ej.Carga || 0}" class="w-full"></div>
                        <div class="flex flex-col"><span class="text-[9px] text-slate-500 uppercase">Variante/Peso Hoy</span><input type="text" placeholder="Anotar..." class="w-full"></div>
                    </div>`;
                }

                card.innerHTML = content;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
